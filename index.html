html, body { height: 100%; }
body {
  font-family: 'ZH', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--gray1); color: var(--black); font-size: 15px;
  -webkit-text-size-adjust: 100%;
}

/* ── App Shell ── */
.app { display: flex; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }
.header {
  background: var(--accent); color: #fff;
  padding: 14px 16px 12px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 10px;
}
.header-title { font-size: 16px; font-weight: 600; flex: 1; }
.header-badge { font-size: 11px; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 10px; }
.content { flex: 1; padding: 14px 14px calc(80px + var(--safe-bottom)); }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
  z-index: 50;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 4px 8px; cursor: pointer;
  color: var(--gray4); font-size: 10px; transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item svg { transition: transform 0.15s; }
.nav-item.active { color: var(--accent); }
.nav-item.active svg { transform: scale(1.1); }
.nav-dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin: 0 auto; opacity: 0; }
.nav-item.active .nav-dot { opacity: 1; }

/* ── Cards ── */
.card { background: var(--white); border-radius: var(--radius-lg); border: var(--border); overflow: hidden; margin-bottom: 12px; }
.card-body { padding: 16px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--gray5); padding: 14px 16px 0; display: flex; align-items: center; gap: 6px; }

/* ── Form ── */
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field-label { font-size: 12px; font-weight: 500; color: var(--gray4); }
input, select, textarea {
  font-family: inherit; font-size: 15px; color: var(--black);
  background: var(--gray1); border: var(--border); border-radius: var(--radius);
  padding: 11px 13px; width: 100%; outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent); background: var(--white);
  box-shadow: 0 0 0 3px rgba(26,77,143,0.1);
}
textarea { resize: none; line-height: 1.5; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Upload ── */
.upload-zone {
  border: 1.5px dashed var(--gray3); border-radius: var(--radius);
  padding: 18px; text-align: center; cursor: pointer;
  background: var(--gray1); transition: all 0.15s;
}
.upload-zone.has-photo { padding: 12px; background: var(--white); border-style: solid; border-color: var(--accent-lt); }
.upload-zone p { font-size: 13px; color: var(--gray4); margin-top: 6px; }
.photo-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; display: block; }
.photo-rm-btn { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 8px; font-size: 12px; color: var(--red); background: var(--red-lt); border: none; border-radius: 6px; padding: 6px 12px; width: 100%; cursor: pointer; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: var(--radius); font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; padding: 13px 20px; -webkit-tap-highlight-color: transparent; }
.btn-primary { background: var(--accent); color: #fff; width: 100%; }
.btn-primary:active { background: var(--accent-dk); }
.btn-primary:disabled { opacity: 0.45; }
.btn-danger-sm { background: var(--red-lt); color: var(--red); border: 0.5px solid #FCA5A5; border-radius: 6px; font-size: 12px; padding: 5px 10px; font-family: inherit; cursor: pointer; font-weight: 500; }

/* ── Month tabs ── */
.month-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 0 16px 12px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.month-scroll::-webkit-scrollbar { display: none; }
.month-tab { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: var(--border); background: var(--white); color: var(--gray5); white-space: nowrap; transition: all 0.15s; }
.month-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.cnt { display: inline-block; margin-left: 3px; font-size: 11px; }
.month-tab.active .cnt { color: rgba(255,255,255,0.75); }
.month-tab:not(.active) .cnt { color: var(--gray4); }

/* ── Expense list items ── */
.expense-item { padding: 14px 16px; border-bottom: var(--border); display: flex; align-items: flex-start; gap: 12px; }
.expense-item:last-child { border-bottom: none; }
.expense-thumb { width: 44px; height: 36px; border-radius: 6px; object-fit: cover; border: var(--border); flex-shrink: 0; }
.expense-thumb-empty { width: 44px; height: 36px; border-radius: 6px; background: var(--gray2); border: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--gray3); flex-shrink: 0; }
.expense-info { flex: 1; min-width: 0; }
.expense-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 12px; color: var(--gray4); display: flex; gap: 8px; align-items: center; }
.expense-reason { font-size: 12px; color: var(--gray4); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.expense-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.expense-amount { font-weight: 600; font-size: 15px; color: var(--accent); }

/* ── Stats ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.stat { background: var(--white); border: var(--border); border-radius: var(--radius); padding: 12px 10px; text-align: center; }
.stat-val { font-size: 20px; font-weight: 600; color: var(--black); }
.stat-val.accent { color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--gray4); margin-top: 2px; }

/* ── Summary table (mobile) ── */
.sum-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: var(--border); gap: 10px; }
.sum-row:last-child { border-bottom: none; }
.sum-idx { width: 20px; text-align: center; font-size: 12px; color: var(--gray4); flex-shrink: 0; }
.sum-info { flex: 1; min-width: 0; }
.sum-name { font-size: 14px; font-weight: 500; }
.sum-date { font-size: 12px; color: var(--gray4); }
.sum-reason { font-size: 12px; color: var(--gray4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sum-amt { font-weight: 600; color: var(--accent); font-size: 14px; flex-shrink: 0; }
.total-row { padding: 13px 16px; display: flex; justify-content: space-between; align-items: center; background: var(--accent-lt); }
.total-lbl { font-size: 13px; color: var(--gray5); font-weight: 500; }
.total-val { font-size: 18px; font-weight: 700; color: var(--accent); }

/* ── Empty ── */
.empty { text-align: center; padding: 40px 20px; color: var(--gray4); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty h3 { font-size: 15px; font-weight: 500; color: var(--gray5); margin-bottom: 4px; }
.empty p { font-size: 13px; }

/* ── Toast ── */
.toast-wrap { position: fixed; top: calc(70px + env(safe-area-inset-top,0px)); left: 14px; right: 14px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); animation: ti 0.2s ease; text-align: center; }
.toast-success { background: var(--green-lt); color: var(--green); border: 0.5px solid #86EFAC; }
.toast-error   { background: var(--red-lt);   color: var(--red);   border: 0.5px solid #FCA5A5; }
.toast-info    { background: var(--accent-lt); color: var(--accent); border: 0.5px solid #93C5FD; }
@keyframes ti { from{transform:translateY(-8px);opacity:0} to{transform:none;opacity:1} }

/* ── Photo modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal-close { position: absolute; top: calc(16px + env(safe-area-inset-top,0px)); right: 16px; background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

/* ── PDF progress ── */
.pdf-progress { background: var(--accent-lt); border: 0.5px solid #93C5FD; border-radius: var(--radius); padding: 14px 16px; font-size: 14px; color: var(--accent); display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.spinner { width: 18px; height: 18px; border: 2px solid rgba(26,77,143,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.divider { border: none; border-top: var(--border); margin: 12px 0; }
.section-label { font-size: 12px; font-weight: 500; color: var(--gray4); text-transform: uppercase; letter-spacing: 0.05em; padding: 14px 16px 6px; }

</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <span class="header-title" id="page-title">添加报销</span>
    <span class="header-badge" id="header-badge"></span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- 添加报销 -->
    <div id="page-add">
      <div class="card">
        <div class="section-label">基本信息</div>
        <div class="card-body" style="padding-top:4px">
          <div class="field">
            <label class="field-label">报销人 *</label>
            <input id="f-sub" type="text" placeholder="请输入姓名" oninput="saveSettings()">
          </div>
          <div class="row2">
            <div class="field">
              <label class="field-label">部门</label>
              <input id="f-dept" type="text" placeholder="所属部门" oninput="saveSettings()">
            </div>
            <div class="field">
              <label class="field-label">报销月份 *</label>
              <select id="f-month-combo"></select>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-label">报销详情</div>
        <div class="card-body" style="padding-top:4px">
          <div class="field">
            <label class="field-label">项目名称 *</label>
            <input id="f-name" type="text" placeholder="例：差旅费、餐饮费、办公用品">
          </div>
          <div class="row2">
            <div class="field">
              <label class="field-label">发生日期 *</label>
              <input id="f-date" type="date">
            </div>
            <div class="field">
              <label class="field-label">报销金额（元）*</label>
              <input id="f-amount" type="number" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
            </div>
          </div>
          <div class="field">
            <label class="field-label">报销理由 *</label>
            <textarea id="f-reason" rows="3" placeholder="请简要描述报销原因"></textarea>
          </div>
          <div class="field">
            <label class="field-label">单据照片</label>
            <div id="upload-area" class="upload-zone" onclick="document.getElementById('f-photo').click()">
              <div id="up-ph">
                <svg width="28" height="28" fill="none" stroke="#bbb" stroke-width="1.5" viewBox="0 0 24 24" style="display:block;margin:0 auto"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p>点击拍照或选择相册照片</p>
              </div>
              <div id="up-prev" style="display:none">
                <img id="prev-img" class="photo-preview" src="" alt="">
                <button class="photo-rm-btn" onclick="rmPhoto(event)">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
                  移除照片
                </button>
              </div>
            </div>
            <input type="file" id="f-photo" accept="image/*,image/heic,image/heif" style="display:none" onchange="photoSelect(event)">
          </div>
        </div>
      </div>

      <button class="btn btn-primary" onclick="addExpense()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        保存报销项目
      </button>
    </div>

    <!-- 报销记录 -->
    <div id="page-list" style="display:none">
      <div class="card" style="overflow:visible">
        <div class="section-label" style="padding-bottom:10px">选择月份</div>
        <div style="padding: 0 16px 4px; display:flex; gap:8px;">
          <select id="list-year" onchange="renderList()" style="width:auto;flex:1"></select>
        </div>
        <div id="list-tabs" class="month-scroll" style="padding-top:10px"></div>
      </div>
      <div class="card" id="list-card">
        <div id="list-content"></div>
      </div>
    </div>

    <!-- 月度汇总 -->
    <div id="page-summary" style="display:none">
      <div class="card">
        <div class="section-label">选择报销月份</div>
        <div class="card-body" style="padding-top:4px">
          <div class="row2">
            <div class="field"><label class="field-label">年份</label><select id="sum-year" onchange="renderSummary()"></select></div>
            <div class="field"><label class="field-label">月份</label><select id="sum-month" onchange="renderSummary()"></select></div>
          </div>
        </div>
      </div>
      <div id="sum-stats"></div>
      <div class="card" id="sum-list-card" style="display:none">
        <div id="sum-list"></div>
        <div id="sum-total" class="total-row"></div>
      </div>
      <div id="sum-empty" style="display:none">
        <div class="empty"><div class="empty-icon">📭</div><h3>暂无报销记录</h3><p>请先在「添加」中录入数据</p></div>
      </div>
      <button class="btn btn-primary" id="btn-pdf" onclick="genPDF()" style="margin-top:4px" disabled>
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        生成 PDF → 存入文件 App
      </button>
      <div id="pdf-status"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-add" onclick="showPage('add')">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <div class="nav-dot"></div>
      <span>添加</span>
    </div>
    <div class="nav-item" id="nav-list" onclick="showPage('list')">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <div class="nav-dot"></div>
      <span>记录</span>
    </div>
    <div class="nav-item" id="nav-summary" onclick="showPage('summary')">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <div class="nav-dot"></div>
      <span>汇总</span>
    </div>
  </nav>
</div>

<!-- Photo modal -->
<div id="photo-modal" class="modal-overlay" style="display:none" onclick="this.style.display='none'">
  <button class="modal-close" onclick="document.getElementById('photo-modal').style.display='none'">×</button>
  <img id="modal-img" src="" style="max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain">
</div>

<div class="toast-wrap" id="toasts"></div>

const DB_KEY = 'expense_mobile_v1';
let DB = (() => { try { return JSON.parse(localStorage.getItem(DB_KEY)||'{"expenses":[],"settings":{}}'); } catch { return {expenses:[],settings:{}}; } })();
if (!DB.expenses) DB.expenses=[];
if (!DB.settings) DB.settings={};
const save = () => localStorage.setItem(DB_KEY, JSON.stringify(DB));

const now = new Date();
let curYear = now.getFullYear();
let listMonth = now.getMonth()+1;
let curPhoto = null;

// ── Init ──────────────────────────────────────────────────────────────────────
function initSelects() {
  const years = [curYear-1, curYear, curYear+1];

  // Month combo for add form: "2026年5月"
  const mc = document.getElementById('f-month-combo');
  years.forEach(y => {
    for (let m=1; m<=12; m++) {
      const o = document.createElement('option');
      o.value = `${y}_${m}`; o.text = `${y}年${m}月`;
      if (y===curYear && m===now.getMonth()+1) o.selected=true;
      mc.appendChild(o);
    }
  });

  // List year
  const ly = document.getElementById('list-year');
  years.forEach(y => { const o=document.createElement('option'); o.value=y; o.text=y+'年'; if(y==curYear) o.selected=true; ly.appendChild(o); });

  // Summary selects
  const sy = document.getElementById('sum-year');
  years.forEach(y => { const o=document.createElement('option'); o.value=y; o.text=y+'年'; if(y==curYear) o.selected=true; sy.appendChild(o); });
  const sm = document.getElementById('sum-month');
  for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.text=m+'月';if(m==now.getMonth()+1)o.selected=true;sm.appendChild(o);}

  document.getElementById('f-date').value = now.toISOString().split('T')[0];
  updateBadge();
  if (DB.settings.sub) document.getElementById('f-sub').value=DB.settings.sub;
  if (DB.settings.dept) document.getElementById('f-dept').value=DB.settings.dept;
}

function saveSettings() {
  DB.settings.sub=document.getElementById('f-sub').value.trim();
  DB.settings.dept=document.getElementById('f-dept').value.trim();
  save();
}

function updateBadge() {
  const m = now.getMonth()+1;
  const cnt = DB.expenses.filter(e=>e.year===String(curYear)&&e.month===String(m)).length;
  document.getElementById('header-badge').textContent = cnt ? `本月 ${cnt} 条` : '';
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showPage(p) {
  ['add','list','summary'].forEach(x=>{
    document.getElementById('page-'+x).style.display = x===p?'':'none';
    document.getElementById('nav-'+x).classList.toggle('active', x===p);
  });
  const t={add:'添加报销',list:'报销记录',summary:'月度汇总'};
  document.getElementById('page-title').textContent=t[p];
  if(p==='list') renderList();
  if(p==='summary') renderSummary();
}

// ── Photo ─────────────────────────────────────────────────────────────────────
function photoSelect(e) { const f=e.target.files[0]; if(f) loadPhoto(f); }
function loadPhoto(file) {
  const r=new FileReader();
  r.onload=ev=>{
    curPhoto=ev.target.result;
    document.getElementById('prev-img').src=curPhoto;
    document.getElementById('up-ph').style.display='none';
    document.getElementById('up-prev').style.display='';
    document.getElementById('upload-area').classList.add('has-photo');
  };
  r.readAsDataURL(file);
}
function rmPhoto(e) {
  e.stopPropagation(); curPhoto=null;
  document.getElementById('f-photo').value='';
  document.getElementById('up-ph').style.display='';
  document.getElementById('up-prev').style.display='none';
  document.getElementById('upload-area').classList.remove('has-photo');
}

// ── Add ───────────────────────────────────────────────────────────────────────
let isSaving = false;
function setSaveBtnState(saving) {
  const btn = document.querySelector('#page-add .btn-primary');
  if (!btn) return;
  if (saving) {
    if (!btn.dataset.originalHtml) btn.dataset.originalHtml = btn.innerHTML;
    btn.disabled = true;
    btn.style.opacity = '0.6';
    btn.innerHTML = '<span>\u4fdd\u5b58\u4e2d...</span>';
  } else {
    btn.disabled = false;
    btn.style.opacity = '';
    if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
  }
}

function addExpense() {
  if (isSaving) return; // 防止重复点击导致重复保存
  const sub=document.getElementById('f-sub').value.trim();
  const dept=document.getElementById('f-dept').value.trim();
  const combo=document.getElementById('f-month-combo').value.split('_');
  const year=combo[0], month=combo[1];
  const name=document.getElementById('f-name').value.trim();
  const date=document.getElementById('f-date').value;
  const reason=document.getElementById('f-reason').value.trim();
  const amount=parseFloat(document.getElementById('f-amount').value);
  if(!sub){toast('\u8bf7\u586b\u5199\u62a5\u9500\u4eba\u59d3\u540d','error');return;}
  if(!name){toast('\u8bf7\u586b\u5199\u9879\u76ee\u540d\u79f0','error');return;}
  if(!date){toast('\u8bf7\u9009\u62e9\u53d1\u751f\u65e5\u671f','error');return;}
  if(!reason){toast('\u8bf7\u586b\u5199\u62a5\u9500\u7406\u7531','error');return;}
  if(!amount||amount<=0){toast('\u8bf7\u8f93\u5165\u6709\u6548\u91d1\u989d','error');return;}

  isSaving = true;
  setSaveBtnState(true);

  // 安全超时：无论如何，3秒后强制恢复按钮，避免永久卡死
  const safetyTimer = setTimeout(()=>{
    isSaving = false;
    setSaveBtnState(false);
  }, 3000);

  try {
    DB.expenses.push({id:'e'+Date.now()+'_'+Math.floor(Math.random()*100000),sub,dept,year:String(year),month:String(month),name,date,reason,amount,photo:curPhoto,at:new Date().toISOString()});
    DB.settings.sub=sub;DB.settings.dept=dept;

    save(); // 可能因为 localStorage 容量超限而抛出异常

    document.getElementById('f-name').value='';
    document.getElementById('f-reason').value='';
    document.getElementById('f-amount').value='';
    document.getElementById('f-date').value=now.toISOString().split('T')[0];
    rmPhoto({stopPropagation:()=>{}});
    updateBadge();
    window.scrollTo({top:0,behavior:'smooth'});

    toast('\u5df2\u4fdd\u5b58\u300c'+name+'\u300d\u00a5'+amount.toFixed(2),'success');

  } catch(err) {
    console.error('addExpense save failed:', err);
    // 保存失败，回滚刚才 push 进去的记录，避免内存和storage不一致
    DB.expenses.pop();

    if (err && err.name === 'QuotaExceededError') {
      toast('\u5b58\u50a8\u7a7a\u95f4\u4e0d\u8db3\uff01\u8bf7\u5220\u9664\u4e00\u4e9b\u65e7\u8bb0\u5f55\u6216\u4e0d\u4e0a\u4f20\u7167\u7247\u540e\u91cd\u8bd5', 'error');
    } else {
      toast('\u4fdd\u5b58\u5931\u8d25\uff1a' + (err && err.message ? err.message : '\u672a\u77e5\u9519\u8bef'), 'error');
    }
  } finally {
    clearTimeout(safetyTimer);
    isSaving = false;
    setSaveBtnState(false);
  }
}

// ── List ──────────────────────────────────────────────────────────────────────
function renderList() {
  const year=document.getElementById('list-year').value;
  const counts={};
  DB.expenses.filter(e=>e.year===String(year)).forEach(e=>{counts[e.month]=(counts[e.month]||0)+1;});
  const tabs=document.getElementById('list-tabs'); tabs.innerHTML='';
  for(let m=1;m<=12;m++){
    const cnt=counts[String(m)]||0;
    const d=document.createElement('div');
    d.className='month-tab'+(m===listMonth?' active':'');
    d.innerHTML=m+'月'+(cnt?`<span class="cnt">${cnt}</span>`:'');
    d.onclick=()=>{listMonth=m;renderList();};
    tabs.appendChild(d);
  }
  // Auto-scroll active tab into view
  setTimeout(()=>{
    const active=tabs.querySelector('.active');
    if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);

  const items=DB.expenses.filter(e=>e.year===String(year)&&e.month===String(listMonth));
  const el=document.getElementById('list-content');
  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🗂️</div><h3>${year}年${listMonth}月暂无记录</h3><p>切换月份或前往「添加」页面录入</p></div>`;
    return;
  }
  const total=items.reduce((s,i)=>s+i.amount,0);
  let h='';
  items.sort((a,b)=>a.date.localeCompare(b.date)).forEach((item,i)=>{
    h+=`<div class="expense-item" data-item-id="${escAttr(item.id)}">
      ${item.photo
        ?`<img class="expense-thumb photo-view-btn" data-item-id="${escAttr(item.id)}">`
        :'<div class="expense-thumb-empty">无</div>'}
      <div class="expense-info">
        <div class="expense-name">${esc(item.name)}</div>
        <div class="expense-meta"><span>${item.date}</span><span>${esc(item.sub||'')}</span></div>
        <div class="expense-reason">${esc(item.reason)}</div>
      </div>
      <div class="expense-right">
        <span class="expense-amount">¥${item.amount.toFixed(2)}</span>
        <button class="btn-danger-sm del-btn" data-item-id="${escAttr(item.id)}">删除</button>
      </div>
    </div>`;
  });
  h+=`<div class="total-row"><span class="total-lbl">本月合计</span><span class="total-val">¥${total.toFixed(2)}</span></div>`;
  el.innerHTML=h;

  // 设置照片 src（避免 base64 直接拼进 HTML 字符串导致体积/转义问题，这里直接用 DOM 赋值）
  el.querySelectorAll('.photo-view-btn').forEach(imgEl=>{
    const id = imgEl.getAttribute('data-item-id');
    const item = DB.expenses.find(e=>String(e.id)===String(id));
    if(item && item.photo){ imgEl.src = item.photo; }
  });

  // 事件委托：删除按钮
  el.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      delItemByIndex(this.getAttribute('data-item-id'));
    });
  });
  // 事件委托：查看照片
  el.querySelectorAll('.photo-view-btn').forEach(imgEl=>{
    imgEl.addEventListener('click', function(){
      viewPhoto(this.getAttribute('data-item-id'));
    });
  });
}

function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function delItemByIndex(id) {
  if(!confirm('确认删除此条记录？'))return;
  const idx = DB.expenses.findIndex(e => String(e.id) === String(id));
  if (idx === -1) {
    toast('删除失败，未找到该记录，请刷新页面重试','error');
    console.error('delItem: id not found:', id);
    console.error('available ids:', DB.expenses.map(e=>e.id));
    return;
  }
  DB.expenses.splice(idx, 1);
  save();
  renderList();
  updateBadge();
  toast('已删除','info');
}

// 保留旧函数名作为兼容
function delItem(id) { delItemByIndex(id); }

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary() {
  const year=document.getElementById('sum-year').value;
  const month=document.getElementById('sum-month').value;
  const items=DB.expenses.filter(e=>e.year===String(year)&&e.month===String(month));
  const total=items.reduce((s,i)=>s+i.amount,0);
  const photos=items.filter(i=>i.photo).length;
  const btn=document.getElementById('btn-pdf');
  const statsEl=document.getElementById('sum-stats');
  const listCard=document.getElementById('sum-list-card');
  const emptyEl=document.getElementById('sum-empty');

  if(!items.length){
    statsEl.innerHTML='';listCard.style.display='none';emptyEl.style.display='';btn.disabled=true;return;
  }
  btn.disabled=false;emptyEl.style.display='none';listCard.style.display='';
  statsEl.innerHTML=`<div class="stats-row">
    <div class="stat"><div class="stat-val">${items.length}</div><div class="stat-lbl">项目数</div></div>
    <div class="stat"><div class="stat-val accent">¥${total.toFixed(2)}</div><div class="stat-lbl">合计金额</div></div>
    <div class="stat"><div class="stat-val">${photos}</div><div class="stat-lbl">单据照片</div></div>
  </div>`;

  const subs=[...new Set(items.map(i=>i.sub).filter(Boolean))].join('、');
  const depts=[...new Set(items.map(i=>i.dept).filter(Boolean))].join('、');
  let h='';
  items.sort((a,b)=>a.date.localeCompare(b.date)).forEach((item,i)=>{
    h+=`<div class="sum-row">
      <span class="sum-idx">${i+1}</span>
      <div class="sum-info">
        <div class="sum-name">${esc(item.name)}</div>
        <div class="sum-date">${item.date}</div>
        <div class="sum-reason">${esc(item.reason)}</div>
      </div>
      <span class="sum-amt">¥${item.amount.toFixed(2)}</span>
    </div>`;
  });
  document.getElementById('sum-list').innerHTML=h;
  document.getElementById('sum-total').innerHTML=`<span class="total-lbl">报销人：${subs||'—'}</span><span class="total-val">¥${total.toFixed(2)}</span>`;
}

// ── PDF ───────────────────────────────────────────────────────────────────────
async function genPDF() {
  const year=document.getElementById('sum-year').value;
  const month=document.getElementById('sum-month').value;
  const items=DB.expenses.filter(e=>e.year===String(year)&&e.month===String(month));
  if(!items.length){toast('\u5f53\u6708\u6ca1\u6709\u62a5\u9500\u8bb0\u5f55','error');return;}
  const btn=document.getElementById('btn-pdf');
  const statusEl=document.getElementById('pdf-status');
  btn.disabled=true;
  statusEl.innerHTML='<div class="pdf-progress"><div class="spinner"></div><span>\u6b63\u5728\u751f\u6210 PDF\uff0c\u8bf7\u7a0d\u5019...</span></div>';
  await new Promise(r=>setTimeout(r,80));
  try {
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    doc.addFileToVFS('ZH.ttf',FONT_B64);
    doc.addFont('ZH.ttf','ZH','normal');
    doc.setFont('ZH');
    const subs=[...new Set(items.map(i=>i.sub).filter(Boolean))].join('\u3001');
    const depts=[...new Set(items.map(i=>i.dept).filter(Boolean))].join('\u3001');
    const total=items.reduce((s,i)=>s+i.amount,0);
    const W=210,M=16;
    const usableW=W-2*M;
    const fmt=n=>Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');

    function drawHeader(pn){
      doc.setFillColor(26,77,143);
      doc.rect(0,0,W,pn===1?46:14,'F');
      if(pn===1){
        doc.setFont('ZH');doc.setFontSize(20);doc.setTextColor(255,255,255);
        doc.text('\u6708\u5ea6\u62a5\u9500\u6c47\u603b',M,18);
        doc.setFontSize(10);doc.setTextColor(170,204,238);
        doc.text(year+' \u5e74 '+month+' \u6708  \u00b7  '+(subs||'\u672a\u586b\u5199')+'  \u00b7  '+(depts||'\u672a\u586b\u5199'),M,28);
        doc.setFontSize(9);doc.setTextColor(138,174,212);
        doc.text('\u62a5\u9500\u603b\u91d1\u989d',W-M,13,{align:'right'});
        doc.setFontSize(18);doc.setTextColor(255,255,255);
        doc.text('\u00a5 '+fmt(total),W-M,24,{align:'right'});
        doc.setDrawColor(68,119,187);doc.setLineWidth(0.4);
        doc.line(M,34,W-M,34);
      } else {
        doc.setFont('ZH');doc.setFontSize(9);doc.setTextColor(170,204,238);
        doc.text('\u6708\u5ea6\u62a5\u9500\u6c47\u603b \u00b7 '+year+'\u5e74'+month+'\u6708 \u00b7 '+subs,M,9);
        doc.text('\u7b2c '+pn+' \u9875',W-M,9,{align:'right'});
      }
      doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);
      doc.line(M,282,W-M,282);
      doc.setFont('ZH');doc.setFontSize(7);doc.setTextColor(180,180,180);
      const gt=new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      doc.text('\u751f\u6210\u65f6\u95f4\uff1a'+gt+'  \u00b7 \u5171 '+items.length+' \u9879  \u00b7 \u5408\u8ba1 \u00a5'+fmt(total),M,287);
    }

    drawHeader(1);
    let y=52;
    doc.setFont('ZH');doc.setFontSize(8);doc.setTextColor(160,160,160);
    doc.text('\u62a5\u9500\u4eba',M,y);doc.text('\u90e8\u95e8',M+46,y);doc.text('\u62a5\u9500\u6708\u4efd',M+92,y);doc.text('\u63d0\u4ea4\u65e5\u671f',M+138,y);
    y+=5;doc.setFontSize(11);doc.setTextColor(17,17,17);
    doc.text(subs||'\u2014',M,y);doc.text(depts||'\u2014',M+46,y);
    doc.text(year+' \u5e74 '+month+' \u6708',M+92,y);
    doc.text(new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}),M+138,y);
    y+=4;doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=7;
    doc.setFont('ZH');doc.setFontSize(11);doc.setTextColor(26,77,143);
    doc.text('\u62a5\u9500\u660e\u7ec6',M,y);y+=5;

    const colW=[9,30,22,80,27,10];
    const sortedItems=items.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const rows=sortedItems.map((item,i)=>[
      String(i+1),item.name,item.date,item.reason,
      '\u00a5 '+fmt(item.amount),item.photo?'\u2713':'\u2014'
    ]);
    doc.autoTable({
      startY:y,head:[['\u5e8f\u53f7','\u9879\u76ee\u540d\u79f0','\u65e5\u671f','\u62a5\u9500\u7406\u7531','\u91d1\u989d\uff08\u5143\uff09','\u5355\u636e']],
      body:rows,foot:[['','','','\u5408  \u8ba1','\u00a5 '+fmt(total),'']],
      tableWidth:usableW,margin:{left:M,right:M},
      styles:{font:'ZH',fontSize:8.5,cellPadding:3,textColor:[40,40,40],lineColor:[220,220,220],lineWidth:0.25,overflow:'linebreak'},
      headStyles:{fillColor:[26,77,143],textColor:255,fontSize:8.5,fontStyle:'normal',halign:'center',cellPadding:4},
      footStyles:{fillColor:[230,240,251],textColor:[26,77,143],fontSize:9.5,fontStyle:'normal',cellPadding:4},
      alternateRowStyles:{fillColor:[247,247,245]},
      columnStyles:{0:{cellWidth:colW[0],halign:'center'},1:{cellWidth:colW[1]},2:{cellWidth:colW[2],halign:'center'},3:{cellWidth:colW[3]},4:{cellWidth:colW[4],halign:'right',textColor:[26,77,143]},5:{cellWidth:colW[5],halign:'center'}},
      didDrawPage:(d)=>{if(d.pageNumber>1)drawHeader(d.pageNumber);}
    });

    let fy=doc.lastAutoTable.finalY+10;
    if(fy>245){doc.addPage();drawHeader(doc.internal.getNumberOfPages());fy=52;}
    doc.setFont('ZH');doc.setFontSize(11);doc.setTextColor(26,77,143);
    doc.text('\u7b7e\u5b57\u786e\u8ba4',M,fy);fy+=5;
    const sigLbls=['\u62a5\u9500\u4eba\u7b7e\u5b57','\u90e8\u95e8\u8d1f\u8d23\u4eba\u5ba1\u6279','\u8d22\u52a1\u5ba1\u6838','\u603b\u7ecf\u7406\u5ba1\u6279'];
    const scw=usableW/4;
    doc.setFillColor(247,247,245);doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);
    doc.rect(M,fy,usableW,28,'FD');
    sigLbls.forEach((lbl,i)=>{
      const x=M+i*scw;
      doc.setFont('ZH');doc.setFontSize(8);doc.setTextColor(130,130,130);
      doc.text(lbl,x+scw/2,fy+5,{align:'center'});
      doc.setFontSize(7.5);doc.setTextColor(180,180,180);
      doc.text('\u65e5\u671f\uff1a___________',x+scw/2,fy+24,{align:'center'});
      if(i>0){doc.line(x,fy,x,fy+28);}
    });

    const pis=items.filter(i=>i.photo);
    if(pis.length>0){
      doc.addPage();drawHeader(doc.internal.getNumberOfPages());
      doc.setFont('ZH');doc.setFontSize(11);doc.setTextColor(26,77,143);
      doc.text('\u5355\u636e\u7167\u7247\u9644\u4ef6',M,52);
      let px=M,py=60;const iw=84,ih=60,gap=5;
      for(let i=0;i<pis.length;i++){
        const item=pis[i];
        if(px+iw>W-M+3){px=M;py+=ih+16;}
        if(py+ih+16>275){doc.addPage();drawHeader(doc.internal.getNumberOfPages());px=M;py=52;}
        try{const f2=item.photo.startsWith('data:image/png')?'PNG':'JPEG';doc.addImage(item.photo,f2,px,py,iw,ih,undefined,'MEDIUM');}
        catch(e){doc.setFillColor(230,230,230);doc.rect(px,py,iw,ih,'F');}
        doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);doc.rect(px,py,iw,ih);
        doc.setFillColor(247,247,245);doc.rect(px,py+ih,iw,10,'F');
        doc.setFont('ZH');doc.setFontSize(7);doc.setTextColor(100,100,100);
        doc.text('No.'+(i+1)+'  '+item.name+'  '+item.date+'  \u00a5'+fmt(item.amount),px+iw/2,py+ih+6.5,{align:'center',maxWidth:iw-2});
        px+=iw+gap;
      }
    }

    // ── 生成 PDF blob ──
    const fileName=year+'\u5e74'+month+'\u6708-\u62a5\u9500\u6c47\u603b.pdf';
    const pdfBlob=doc.output('blob');

    // ── 方案1：Web Share API 分享（让用户自己选择存到文件或其他） ──
    if(navigator.share && navigator.canShare){
      const file=new File([pdfBlob],fileName,{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){
        try{
          await navigator.share({
            title:year+'\u5e74'+month+'\u6708\u62a5\u9500\u6c47\u603b',
            files:[file]
          });
          statusEl.innerHTML='';
          // 显示提示：选「存储到文件」然后发微信
          statusEl.innerHTML='<div class="pdf-progress" style="background:var(--green-lt);color:var(--green);border-color:#86EFAC;">'
            +'<span>✅ \u5206\u4eab\u83dc\u5355\u5df2\u5f39\u51fa\u2192 \u9009\u300c\u5b58\u50a8\u5230\u300e\u6587\u4ef6\u300f\u300d\u2192 \u518d\u4ece\u6587\u4ef6 App \u53d1\u5fae\u4fe1</span></div>';
          btn.disabled=false;return;
        }catch(e){
          if(e.name==='AbortError'){
            statusEl.innerHTML='';btn.disabled=false;return;
          }
        }
      }
    }

    // ── 方案2：直接下载（桌面浏览器备用） ──
    const url=URL.createObjectURL(pdfBlob);
    const a=document.createElement('a');
    a.href=url;a.download=fileName;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},2000);
    statusEl.innerHTML='<div class="pdf-progress" style="background:var(--green-lt);color:var(--green);border-color:#86EFAC;">'
      +'<span>✅ PDF \u5df2\u4fdd\u5b58\uff0c\u53ef\u5728\u300e\u6587\u4ef6\u300f App \u4e2d\u627e\u5230\uff0c\u518d\u53d1\u7ed9\u5fae\u4fe1</span></div>';
    toast('PDF \u5df2\u4fdd\u5b58\uff01','success');

  } catch(e) {
    statusEl.innerHTML='<div class="pdf-progress" style="background:var(--red-lt);color:var(--red);border-color:#FCA5A5">\u26a0\ufe0f \u751f\u6210\u5931\u8d25\uff1a'+e.message+'</div>';
    toast('\u751f\u6210\u5931\u8d25','error');console.error(e);
  }
  btn.disabled=false;
}

function viewPhoto(id) {
  const item=DB.expenses.find(e=>String(e.id)===String(id));
  if(!item||!item.photo)return;
  document.getElementById('modal-img').src=item.photo;
  document.getElementById('photo-modal').style.display='flex';
}
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;el.textContent=msg;
  const wrap=document.getElementById('toasts');
  wrap.appendChild(el);
  setTimeout(()=>{
    el.style.transition='opacity 0.3s ease';
    el.style.opacity='0';
    setTimeout(()=>el.remove(),300);
  },3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
initSelects();
